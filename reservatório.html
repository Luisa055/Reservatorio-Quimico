<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoramento de Tanque</title>
    <link rel="stylesheet" href="reservatório.css">
</head>
<body>

    <div class="container">

        <h1>Monitoramento do Tanque</h1>

        <div class="painel">
            <h2>Carga do Tanque</h2>
            <p id="volume">0 L</p>
        </div>

        <div id="alerta" class="alerta oculto">
            RISCO DE TRANSBORDAMENTO!
        </div>

        <div class="botoes">
            <button id="encher">Adicionar 100L</button>
            <button id="resetar">Esvaziar Tanque</button>
        </div>

        <div class="status">
            <p id="statusSistema">Sistema Operando Normalmente</p>
        </div>

    </div>

    <script src="reservatório.js"></script>

</body>
</html>.
